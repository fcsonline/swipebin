services:
  swipebin:
    build: .
    image: swipebin
    container_name: swipebin
    ports:
      - "3000:3000"
    volumes:
      # 👇 Mount each folder you want to clean as its own collection under /data/folders.
      #    The name after /data/folders/ is what shows in the app's folder picker.
      #    Add or remove lines to add/remove collections.
      - ./photos:/data/folders/Photos
      - "${HOME}/Downloads:/data/folders/Downloads"
      # - "${HOME}/Pictures/Trip 2024:/data/folders/Trip 2024"
      # - "${HOME}/Camera/RAW:/data/folders/RAW"

      # State (decisions) + generated preview cache, persisted across restarts.
      - swipebin-data:/data/app
    environment:
      FOLDERS_DIR: /data/folders
      APP_DIR: /data/app
      PORT: "3000"
      PREVIEW_WIDTH: "1080"
      # For a phone-scannable QR/Network URL, set your computer's LAN IP, e.g.:
      #   PUBLIC_HOST=192.168.1.42 docker compose up
      PUBLIC_HOST: ${PUBLIC_HOST:-}
      PUBLIC_URL: ${PUBLIC_URL:-}
    restart: unless-stopped

volumes:
  swipebin-data:
