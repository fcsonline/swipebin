services:
  swipebin:
    build: .
    image: swipebin
    container_name: swipebin
    ports:
      - "3000:3000"
    volumes:
      # 👇 Mount the folder of pictures you want to triage here.
      - ./photos:/data/images
      # State (decisions) + generated preview cache, persisted across restarts.
      - swipebin-data:/data/app
    environment:
      IMAGES_DIR: /data/images
      APP_DIR: /data/app
      PORT: "3000"
      PREVIEW_WIDTH: "1080"
      # For a phone-scannable QR/Network URL, set your computer's LAN IP, e.g.:
      #   PUBLIC_HOST=192.168.1.42 docker compose up
      PUBLIC_HOST: ${PUBLIC_HOST:-}
      PUBLIC_URL: ${PUBLIC_URL:-}
    restart: unless-stopped

volumes:
  swipebin-data:
